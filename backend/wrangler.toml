name = "sparqplug-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Local-only bootstrap vars — do not rely on these tracked placeholders in production.
# Move production values into Wrangler-managed secrets or environment-specific vars.
BOOTSTRAP_SECRET = "dev_bootstrap_secret"
ADMIN_EMAIL = "admin@example.com"
ADMIN_PASSWORD = "changeme123"
ADMIN_NAME = "Admin"
ADMIN_ORG_NAME = "SparQPlug"
FIREBASE_API_KEY = ""

[[d1_databases]]
binding = "DB"
database_name = "sparqplug-db"
database_id = "8330f49d-2bff-4525-b48f-082f08bd22b7"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "sparqplug-files"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "sparqplug-emails"

[durable_objects]
bindings = [
  { name = "REALTIME_DO", class_name = "RealtimeDurableObject" },
  { name = "RECORD_LOCK_DO", class_name = "RecordLockDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeDurableObject", "RecordLockDurableObject"]

# Secrets — set via: wrangler secret put SECRET_NAME
# Required secrets:
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# FIREBASE_SERVICE_ACCOUNT
# JWT_SECRET
# CLOUDFLARE_ANALYTICS_TOKEN
# Optional but recommended for CRM password locker encryption isolation:
# PASSWORD_LOCKER_KEY

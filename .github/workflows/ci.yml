name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check workspace
        run: pnpm run type-check

      - name: Lint workspace
        run: pnpm run lint

      - name: Build web app
        run: pnpm run build:web

      - name: Build backend worker
        run: pnpm --filter @sparqplug/backend run build

      - name: Type check mobile app
        run: pnpm --filter @sparqplug/mobile run type-check
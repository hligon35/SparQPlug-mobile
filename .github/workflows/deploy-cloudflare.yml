name: Deploy SparQPlug to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker and Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://sparqplug-api.hligon.workers.dev/api/v1' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check backend
        run: pnpm --filter @sparqplug/backend run type-check

      - name: Build web app
        run: pnpm --filter @sparqplug/web run build:deploy

      - name: Deploy backend Worker
        run: pnpm --filter @sparqplug/backend run deploy

      - name: Apply remote D1 migrations
        run: pnpm --filter @sparqplug/backend run db:migrate:remote

      - name: Deploy Cloudflare Pages
        run: pnpm --filter @sparqplug/backend exec wrangler pages deploy ../apps/web/dist --project-name sparqplug-web --branch main --commit-dirty=true
